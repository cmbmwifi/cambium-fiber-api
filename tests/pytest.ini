# pub/tests/pytest.ini
[pytest]
# Production validation test configuration

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# BDD configuration (pytest-bdd)
bdd_features_base_dir = features

# Markers for test categorization
markers =
    production_safe: Tests safe to run in production (read-only or dry-run)
    read_only: Tests that only read data (no modifications)
    dry_run: Tests that use dry-run mode for write operations
    health: Health check and monitoring endpoint tests
    auth: Authentication and authorization tests
    olts: OLT management endpoint tests
    onus: ONU management endpoint tests
    profiles: ONU profile management endpoint tests
    services: Service profile management endpoint tests
    slow: Tests that may take longer to complete

# Output configuration
console_output_style = progress
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -v
    --json-report
    --json-report-file=.pytest_cache/validation-report.json
    --json-report-indent=2

# Coverage (optional - if pytest-cov installed)
# addopts = --cov=. --cov-report=html --cov-report=term

# Timeouts (optional - if pytest-timeout installed)
# timeout = 60
# timeout_method = thread
